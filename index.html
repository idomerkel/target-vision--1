<style>
        /* Add these new styles to your existing CSS */
        .dashboard { display: flex; width: 400px; flex-direction: column; background: #161616; padding: 10px; overflow-y: auto; border-left: 2px solid #333; }
        .graph-container { width: 100%; height: 120px; background: #000; border: 1px solid #444; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .graph-label { position: absolute; top: 5px; left: 5px; font-size: 10px; color: #888; }
        .split-view { display: flex; gap: 10px; flex: 1; overflow-y: hidden; }
        .feed-col { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .feed-col h3 { font-size: 14px; margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>

    <div class="dashboard">
        <h3 style="margin: 0 0 5px 0; font-size: 14px;">Live Sensor Telemetry</h3>
        <div class="graph-container">
            <span class="graph-label"><span style="color:red">Roll (X)</span> | <span style="color:green">Pitch (Y)</span> | <span style="color:#00aaff">Yaw (Z)</span></span>
            <canvas id="gyroGraph" width="380" height="120"></canvas>
        </div>
        
        <div class="split-view">
            <div class="feed-col">
                <h3>Visual Tracking</h3>
                <div id="shotList"></div>
            </div>
            <div class="feed-col">
                <h3>Kinematic Errors</h3>
                <div id="kinematicList"></div>
            </div>
        </div>
    </div>
