<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Analysis - Kinematic Fusion</title>
    <script>
        var Module = { onRuntimeInitialized: function() { onOpenCvReady(); } };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; border-right: 2px solid #333; overflow-y: auto; }
        .video-box { position: relative; width: 640px; height: 480px; max-width: 95vw; max-height: 70vh; border: 3px solid #444; border-radius: 12px; overflow: hidden; background: #000; flex-shrink: 0; }
        video, canvas.overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: fill; }
        canvas.overlay { pointer-events: none; z-index: 10; }
        .sidebar { width: 400px; background: #161616; padding: 20px; overflow-y: auto; }
        .card { background: #222; border-radius: 8px; padding: 15px; border-left: 4px solid #ff3b30; margin-bottom: 15px; }
        button { background: #ff3b30; color: white; border: none; padding: 12px 24px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; margin: 5px; }
        #status { font-weight: bold; font-size: 14px; color: #00ff00; margin-bottom: 10px; text-align: center; }
        .debug-view { width: 160px; height: 120px; border: 1px solid #444; background: #000; margin-top: 10px; }
        .mistake { display: flex; justify-content: space-between; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="main">
        <h2 style="margin:0 0 10px 0; font-size: 18px;">Diagnostic Vision Engine</h2>
        <p id="status">Loading WASM...</p>
        <div class="video-box" id="vbox">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" class="overlay"></canvas>
        </div>
        <div style="margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button id="btnCam" onclick="startCamera()">Start Camera</button>
            <button id="btnBase" onclick="setBaseline()" disabled>1. Lock Baseline</button>
            <button id="btnTrack" onclick="toggleTracking(); enableSensors();" disabled>2. Start Session</button>
        </div>
        <canvas id="debugCanvas" class="debug-view"></canvas>
    </div>

    <div class="sidebar">
        <h3 style="border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 16px;">Diagnostic Feedback</h3>
        <div id="shotList"></div>
    </div>

    <canvas id="calcCanvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // ==========================================
    // VISUAL TRACKING ENGINE (OPENCV)
    // ==========================================
    let isTracking = false;
    let orb = null, matcher = null, refKP = null, refDesc = null, refGray = null;
    let cropSize = 0, targetRadius = 0, persistentShots = [], candidates = [], blacklist = [];
    const PROXIMITY = 15.0, REQ_FRAMES = 5; 

    function onOpenCvReady() {
        document.getElementById('status').innerText = "OpenCV Ready. Tap Start Camera.";
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } })
            .then(s => { 
                const v = document.getElementById('webcam');
                v.srcObject = s; 
                v.onloadedmetadata = () => {
                    const ov = document.getElementById('overlayCanvas');
                    ov.width = v.videoWidth;
                    ov.height = v.videoHeight;
                    document.getElementById('btnBase').disabled = false; 
                    document.getElementById('btnCam').style.display = 'none';
                    document.getElementById('status').innerText = "Camera Active.";
                };
            }).catch(e => {
                document.getElementById('status').innerText = "Camera Error.";
                console.error(e);
            });
    }

    function grab() {
        let cvs = document.getElementById('calcCanvas');
        let ctx = cvs.getContext('2d');
        let v = document.getElementById('webcam');
        ctx.save();
        ctx.translate(640, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(v, 0, 0, 640, 480);
        ctx.restore();
        return cv.imread(cvs);
    }

    function setBaseline() {
        if(!orb) { 
            orb = new cv.ORB(1500);
            matcher = new cv.BFMatcher(cv.NORM_HAMMING, true); 
            refKP = new cv.KeyPointVector(); refDesc = new cv.Mat();
        }
        let frame = grab();
        let gray = new cv.Mat(), thresh = new cv.Mat();
        cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
        cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 15, 5);
        let contours = new cv.MatVector(), hierarchy = new cv.Mat();
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        let best = null, maxA = 0;
        for(let i=0; i<contours.size(); i++) {
            let a = cv.contourArea(contours.get(i));
            if(a > 3000 && a > maxA) { maxA = a; best = cv.minEnclosingCircle(contours.get(i)); }
        }
        if(!best) { alert("Center target!"); frame.delete(); gray.delete(); thresh.delete(); return; }

        targetRadius = Math.round(best.radius);
        cropSize = targetRadius * 2 + 60;
        let rect = new cv.Rect(Math.max(0, best.center.x - cropSize/2), Math.max(0, best.center.y - cropSize/2), 
                               Math.min(640 - Math.max(0, best.center.x - cropSize/2), cropSize), 
                               Math.min(480 - Math.max(0, best.center.y - cropSize/2), cropSize));
        let roi = frame.roi(rect);
        if(refGray) refGray.delete();
        refGray = new cv.Mat();
        cv.cvtColor(roi, refGray, cv.COLOR_RGBA2GRAY);
        
        let mask = cv.Mat.zeros(roi.rows, roi.cols, cv.CV_8UC1);
        cv.circle(mask, new cv.Point(roi.cols/2, roi.rows/2), targetRadius - 10, new cv.Scalar(255), -1);
        orb.detectAndCompute(refGray, mask, refKP, refDesc);

        document.getElementById('debugCanvas').width = roi.cols;
        document.getElementById('debugCanvas').height = roi.rows;
        document.getElementById('btnTrack').disabled = false;
        document.getElementById('status').innerText = "Baseline Locked.";
        frame.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); mask.delete(); roi.delete();
    }

    function trackingLoop() {
        if(!isTracking) return;
        let frame = grab();
        let grayLive = new cv.Mat(), liveKP = new cv.KeyPointVector(), liveDesc = new cv.Mat(), matches = new cv.DMatchVector();
        try {
            cv.cvtColor(frame, grayLive, cv.COLOR_RGBA2GRAY);
            orb.detectAndCompute(grayLive, new cv.Mat(), liveKP, liveDesc);
            if(!liveDesc.empty()) {
                matcher.match(refDesc, liveDesc, matches);
                let good = [];
                for(let i=0; i<matches.size(); i++) { if(matches.get(i).distance < 48) good.push(matches.get(i)); }
                if(good.length > 10) {
                    let srcP = [], dstP = [];
                    for(let m of good) { srcP.push(refKP.get(m.queryIdx).pt.x, refKP.get(m.queryIdx).pt.y); dstP.push(liveKP.get(m.trainIdx).pt.x, liveKP.get(m.trainIdx).pt.y); }
                    let matSrc = cv.matFromArray(good.length, 1, cv.CV_32FC2, srcP), matDst = cv.matFromArray(good.length, 1, cv.CV_32FC2, dstP);
                    let H = cv.findHomography(matSrc, matDst, cv.RANSAC, 5.0);
                    if(!H.empty()) {
                        let invH = new cv.Mat();
                        cv.invert(H, invH, cv.DECOMP_LU);
                        let warped = new cv.Mat(); cv.warpPerspective(grayLive, warped, invH, new cv.Size(refGray.cols, refGray.rows));
                        let refBlur = new cv.Mat(), warpedBlur = new cv.Mat();
                        cv.GaussianBlur(refGray, refBlur, new cv.Size(3, 3), 0);
                        cv.GaussianBlur(warped, warpedBlur, new cv.Size(3, 3), 0);
                        let diff = new cv.Mat(), thresh = new cv.Mat();
                        cv.absdiff(refBlur, warpedBlur, diff);
                        cv.threshold(diff, thresh, 40, 255, cv.THRESH_BINARY);
                        let liveMask = cv.Mat.zeros(refGray.rows, refGray.cols, cv.CV_8UC1);
                        cv.circle(liveMask, new cv.Point(refGray.cols/2, refGray.rows/2), targetRadius - 15, new cv.Scalar(255), -1);
                        let maskedThresh = new cv.Mat();
                        thresh.copyTo(maskedThresh, liveMask);
                        cv.imshow('debugCanvas', maskedThresh);
                        let contours = new cv.MatVector(), hier = new cv.Mat();
                        cv.findContours(maskedThresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        let currentHoles = [];
                        for(let i=0; i<contours.size(); i++) {
                            let cnt = contours.get(i), area = cv.contourArea(cnt);
                            if(area > 12 && area < 600) {
                                let M = cv.moments(cnt);
                                let p = {x: M.m10/M.m00, y: M.m01/M.m00};
                                if(blacklist.some(b => Math.hypot(b.x-p.x, b.y-p.y) < PROXIMITY)) continue;
                                let hull = new cv.Mat();
                                cv.convexHull(cnt, hull);
                                let solidity = area / (cv.contourArea(hull) || 1);
                                hull.delete();
                                if(solidity > 0.86) currentHoles.push(p);
                                else if(solidity < 0.75) blacklist.push(p);
                            }
                        }
                        processShots(currentHoles);
                        drawOverlay(H);
                        invH.delete(); warped.delete(); diff.delete(); thresh.delete(); 
                        refBlur.delete(); warpedBlur.delete(); liveMask.delete(); maskedThresh.delete(); 
                        contours.delete(); hier.delete(); H.delete();
                    }
                    matSrc.delete(); matDst.delete();
                }
            }
        } catch(e) { console.error(e); } finally {
            frame.delete(); grayLive.delete(); liveKP.delete(); liveDesc.delete(); matches.delete();
        }
        requestAnimationFrame(trackingLoop);
    }

    function processShots(holes) {
        for(let h of holes) {
            if(persistentShots.some(s => Math.hypot(s.x-h.x, s.y-h.y) < PROXIMITY)) continue;
            let c = candidates.find(can => Math.hypot(can.x-h.x, can.y-h.y) < PROXIMITY);
            if(c) { 
                c.f++;
                if(c.f >= REQ_FRAMES) {
                    persistentShots.push({id: Date.now(), x:h.x, y:h.y, d: getDiag(h.x, h.y)});
                    refreshList();
                    candidates = candidates.filter(can => can !== c);
                }
            } else candidates.push({x:h.x, y:h.y, f:1});
        }
        candidates.forEach(c => { c.f -= 0.1; });
        candidates = candidates.filter(c => c.f > 0);
    }

    // UPDATED DATA FUSION: Merges OpenCV Visual Guess with Gyro Sensor Physical Data
    function getDiag(x, y) {
        let dx = x - refGray.cols/2, dy = refGray.rows/2 - y;
        let a = Math.atan2(dy, dx) * (180/Math.PI); if(a < 0) a += 360;
        
        let visualDiagnosis;
        if(a > 45 && a <= 135) visualDiagnosis = {z:"High", m:[{n:"Riding Recoil", p:"High"},{n:"Heeling", p:"Med"}]};
        else if(a > 135 && a <= 225) visualDiagnosis = {z:"Left", m:[{n:"Trigger Depth", p:"High"},{n:"Grip Tension", p:"Med"}]};
        else if(a > 225 && a <= 315) visualDiagnosis = {z:"Low", m:[{n:"Trigger Jerking", p:"High"},{n:"Anticipation", p:"Med"}]};
        else visualDiagnosis = {z:"Right", m:[{n:"Finger Tip Pressure", p:"High"},{n:"Thumb Pressure", p:"Med"}]};

        // Pull the physical movement data captured milliseconds before the shot
        let physicalDiagnosis = latestPhysicalMistake || "Stable (No sharp pre-shot movement detected)";
        
        // Clear it so it doesn't accidentally carry over to a future shot
        latestPhysicalMistake = null; 

        return {
            z: visualDiagnosis.z, 
            m: visualDiagnosis.m,
            sensorRaw: physicalDiagnosis // Added the physical diagnosis to the object
        };
    }

    // UPDATED UI: Shows both the visual zone and the sensor data
    function refreshList() {
        const list = document.getElementById('shotList');
        list.innerHTML = persistentShots.slice().reverse().map((s, i) => `
            <div class="card">
                <h4 style="margin-top:0;">Shot #${persistentShots.length-i}: ${s.d.z} Zone</h4>
                <div style="font-size:12px; color:#aaa; margin-bottom:10px; border-bottom:1px solid #444; padding-bottom:5px;">
                    <strong>IMU Sensor:</strong> <span style="color:#fff;">${s.d.sensorRaw}</span>
                </div>
                ${s.d.m.map(m => `<div class="mistake"><span>${m.n} (Visual Guess)</span><span class="prob" style="color:${m.p==='High'?'#ff3b30':'#00ff00'}">${m.p}</span></div>`).join('')}
            </div>
        `).join('');
    }

    function drawOverlay(H) {
        let ctx = document.getElementById('overlayCanvas').getContext('2d');
        ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
        persistentShots.forEach((s, idx) => {
            let p = cv.matFromArray(3, 1, cv.CV_64F, [s.x, s.y, 1.0]);
            let dP = new cv.Mat(); cv.gemm(H, p, 1, new cv.Mat(), 0, dP);
            let x = dP.data64F[0]/dP.data64F[2];
            let y = dP.data64F[1]/dP.data64F[2];
            
            ctx.beginPath(); ctx.arc(x,y,10,0,6.28); ctx.fillStyle="rgba(0,255,0,0.7)"; ctx.fill();
            ctx.strokeStyle="white"; ctx.stroke();
            ctx.fillStyle="white"; ctx.font="11px sans-serif"; ctx.fillText("#"+(idx+1), x+14, y);
            p.delete(); dP.delete();
        });
    }

    function toggleTracking() { 
        isTracking = !isTracking;
        if(isTracking) {
            document.getElementById('status').innerText = "Session Active.";
            trackingLoop();
        }
    }

    // ==========================================
    // PARALLEL KINEMATIC DIAGNOSTIC ENGINE (IMU)
    // ==========================================
    const KINEMATIC_BATCH_SIZE = 25; 
    let kinematicBuffer = [];
    let latestPhysicalMistake = null;
    let lastShotTime = 0;

    const GYRO_SHOT_THRESHOLD = 80;   
    const ACCEL_SHOT_THRESHOLD = 15;  
    const GYRO_MOVE_THRESH = 10.0;    
    const ACCEL_MOVE_THRESH = 1.5;    

    const mistakeDB = [
        { name: "Jerking the trigger", patterns: ["Down", "Pitch"] },
        { name: "Flinching/anticipating", patterns: ["Down", "Pitch"] },
        { name: "Inconsistent finger placement", patterns: ["Left", "Yaw", "Right"] },
        { name: "Poor grip/stance", patterns: ["Left", "Right", "Roll"] },
        { name: "Not following through", patterns: ["Down", "Pitch"] },
        { name: "Canting firearm", patterns: ["Roll"] },
        { name: "Fatigue/shaking", patterns: ["Up", "Down", "Left", "Right"] }
    ];

    function enableSensors() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        document.getElementById('status').innerText = "Session & Sensors Active.";
                    } else {
                        document.getElementById('status').innerText = "Sensor Access Denied.";
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('status').innerText = "Sensor Error (Needs HTTPS).";
                });
        } else {
            // Standard Android behavior
            window.addEventListener('devicemotion', handleMotion); 
            document.getElementById('status').innerText = "Session & Sensors Active.";
        }
    }

    function handleMotion(event) {
        if (!isTracking) return; 

        // CRITICAL FIX: The '?.' prevents crashes if the phone's sensor isn't ready
        let ax = event.acceleration?.x || 0;
        let ay = event.acceleration?.y || 0;
        let az = event.acceleration?.z || 0;
        let gx = event.rotationRate?.alpha || 0; 
        let gy = event.rotationRate?.beta || 0;  
        let gz = event.rotationRate?.gamma || 0; 

        let now = Date.now();

        kinematicBuffer.push({ax, ay, az, gx, gy, gz});
        if (kinematicBuffer.length > KINEMATIC_BATCH_SIZE) {
            kinematicBuffer.shift(); 
        }

        if (now - lastShotTime > 500) {
            if (Math.abs(gx) > GYRO_SHOT_THRESHOLD || Math.abs(gy) > GYRO_SHOT_THRESHOLD || Math.abs(ax) > ACCEL_SHOT_THRESHOLD) {
                lastShotTime = now;
                analyzePreShotWindow();
            }
        }
    }

    function analyzePreShotWindow() {
        let down = false, up = false, left = false, right = false;
        let pitch = false, yaw = false, roll = false;
        let moveString = "";

        // Safe array slicing to prevent errors
        let startIndex = Math.max(0, kinematicBuffer.length - 5);
        let preShotFrames = kinematicBuffer.slice(0, startIndex); 

        for (let s of preShotFrames) {
            if (s.ax > ACCEL_MOVE_THRESH) right = true;
            if (s.ax < -ACCEL_MOVE_THRESH) left = true;
            if (s.az > ACCEL_MOVE_THRESH) up = true;
            if (s.az < -ACCEL_MOVE_THRESH) down = true;
            
            if (Math.abs(s.gx) > GYRO_MOVE_THRESH) roll = true;
            if (Math.abs(s.gy) > GYRO_MOVE_THRESH) pitch = true;
            if (Math.abs(s.gz) > GYRO_MOVE_THRESH) yaw = true;
        }

        if (down) moveString += "Down,";
        if (up) moveString += "Up,";
        if (left) moveString += "Left,";
        if (right) moveString += "Right,";
        if (pitch) moveString += "Pitch,";
        if (yaw) moveString += "Yaw,";
        if (roll) moveString += "Roll,";

        let bestMatch = null;
        let maxScore = 0;

        for (let mistake of mistakeDB) {
            let score = 0;
            for (let pattern of mistake.patterns) {
                if (moveString.includes(pattern)) score += 10;
            }
            if (score > maxScore) {
                maxScore = score;
                bestMatch = mistake.name;
            }
        }
        
        if (bestMatch && maxScore > 0) {
            latestPhysicalMistake = bestMatch;
        }
    }
</script>
</body>
</html>
